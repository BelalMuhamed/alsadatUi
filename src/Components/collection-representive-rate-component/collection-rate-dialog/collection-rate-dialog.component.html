<mat-card class="edit-card">
  <div class="edit-header">
    <button mat-icon-button class="close-btn" (click)="cancel()" aria-label="close"><mat-icon>close</mat-icon></button>
    <div class="title-block">
      <mat-card-title>{{ isEdit ? 'تعديل نسبة التحصيل' : 'إضافة نسبة جديدة' }}</mat-card-title>
    </div>
  </div>
  <mat-card-content dir="rtl" class="content-scroll">
    <form class="mt-2">
      <div class="grid-form">
        <mat-form-field appearance="outline" class="custom-input-theme full-width">
          <mat-label>من</mat-label>
          <input matInput type="number" [(ngModel)]="model.from" name="from" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="custom-input-theme full-width">
          <mat-label>إلى</mat-label>
          <input matInput type="number" [(ngModel)]="model.to" name="to" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="custom-input-theme full-width">
          <mat-label>النسبة (%)</mat-label>
          <input matInput type="number" [(ngModel)]="model.precentage" name="precentage" />
        </mat-form-field>
      </div>
    </form>
  </mat-card-content>
  <mat-card-actions>
    <button mat-stroked-button color="primary" (click)="save()" [disabled]="isLoading">{{ isLoading ? 'جاري الحفظ...' : 'حفظ' }}</button>
    <button mat-stroked-button color="warn" (click)="cancel()" [disabled]="isLoading">إلغاء</button>
  </mat-card-actions>
</mat-card>
