<div class="salary-container">
  <div class="header-section">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>نسب تحصيل المندوب من الفلوس</h2>
      <div class="action-buttons">
        <button mat-stroked-button color="primary" (click)="openAdd()" class="action-btn mx-2">
          <mat-icon>add</mat-icon>
          إضافة
        </button>
      </div>
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <div *ngIf="isLoading" class="text-center">جاري التحميل...</div>

      <table mat-table [dataSource]="items" class="mat-elevation-z1" dir="rtl" *ngIf="!isLoading">

        <ng-container matColumnDef="range">
          <th mat-header-cell *matHeaderCellDef>من - إلي</th>
          <td mat-cell *matCellDef="let d">{{ d.from }} - {{ d.to }}</td>
        </ng-container>

        <ng-container matColumnDef="percentage">
          <th mat-header-cell *matHeaderCellDef>النسبة (%)</th>
          <td mat-cell *matCellDef="let d">{{ d.precentage }}</td>
        </ng-container>

        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>تاريخ الإنشاء</th>
          <td mat-cell *matCellDef="let d">{{ d.createdAt ? (d.createdAt | date:'dd/MM/yyyy') : '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>الحالة</th>
          <td mat-cell *matCellDef="let d" style="text-align:center">
            <mat-slide-toggle [checked]="!d.isDeleted" (change)="toggleStatus(d)" matTooltip="تفعيل/تعطيل"></mat-slide-toggle>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>إجراءات</th>
          <td mat-cell *matCellDef="let d">
            <button mat-icon-button color="primary" (click)="openEdit(d)" title="تعديل"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button (click)="hardDelete(d)" title="حذف نهائي"><mat-icon>delete_forever</mat-icon></button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['range','percentage','createdAt','status','actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['range','percentage','createdAt','status','actions'];"></tr>
      </table>
    </mat-card-content>
  </mat-card>

  <div dir="rtl" class="paginator-container">
    <mat-paginator [length]="totalCount" [pageSize]="pageSize" [pageSizeOptions]="[5,10,25,50]" (page)="onPageChange($event)" [showFirstLastButtons]="true"></mat-paginator>
  </div>

  <div *ngIf="!isLoading && (!items || items.length === 0)" class="empty-state text-center justify-content-center ">
    لا توجد سجلات
  </div>
</div>
